<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Mining & Profit Tracker - Elegant Dashboard" />
    <meta name="theme-color" content="#0a0e17" />
    <title>Mining Tracker | Dashboard</title>
    
    <!-- Preload fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      /* Critical CSS - prevent flash of unstyled content */
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { background: #0a0e17; color: #f9fafb; overflow-x: hidden; }
      #app {
        min-height: 100vh;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      }
      /* Loading spinner */
      .app-loader {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; align-items: center; justify-content: center;
        background: #0a0e17;
      }
      .app-loader__spinner {
        width: 48px; height: 48px;
        border: 3px solid rgba(6, 182, 212, 0.15);
        border-top-color: #06b6d4;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="app">
      <!-- Loading state while Vue initializes -->
      <div class="app-loader">
        <div class="app-loader__spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
